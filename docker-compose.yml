
version: '3.8'

services:
  backend:
    build: ./backend
    container_name: signflow-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: signflow-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
